name: Verify iPhone and iPad app

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/build-ios.yml"

permissions:
  contents: read

jobs:
  unsigned-simulator-build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run ios:sync
      - name: Compile unsigned iPhone and iPad application
        working-directory: web/ios/App
        run: >-
          xcodebuild
          -project App.xcodeproj
          -scheme App
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath build
          CODE_SIGNING_ALLOWED=NO
          build
      - uses: actions/upload-artifact@v4
        with:
          name: microbial-mayhem-ios-simulator-app
          path: web/ios/App/build/Build/Products/Debug-iphonesimulator/App.app
          if-no-files-found: error
          retention-days: 14
